# BDD - in-domain evaluation (Section 4)
# NOTE: data/validate_results_BDD.txt is not bundled in this repository (the
# raw file is too large). See data/README.md for instructions on regenerating
# it from the EfficientDet-d0 model trained on BDD.
dataset: "BDD"
dataset_path: "data/validate_results_BDD.txt"

seed: 42
runs: 100
runs_classification: 1
split: 0.2

alpha_only_regression: 0.1
alpha_regression: 0.1
alpha_only_class: 0.1
alpha_class: 0.01

iou_threshold: 0.5
dc_threshold: 0.5
threshold:
  - 0.4
  - 0.5
  - 0.6
  - 0.7
  - 0.8

# BDD predictions store the aleatoric uncertainty under a different key
# (`uncalib_uncert_albox`) than the KITTI / CODA dumps.
uncertainty: "uncalib_uncert_albox"
all_uncertainties:
  - uncalib_uncert_albox
  - iso_alluncert_albox
  - rel_iso_perclscoo_albox

save_t_test: True

# RAPS hyperparameters (Section 3.1, classification CP).
lam_reg: 0.01
k_reg: 5
